name: DCO

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  dco-check:
    name: Signed-off-by check
    runs-on: ubuntu-latest
    steps:
      - name: Check commits for DCO sign-off
        uses: tisonkun/actions-dco@v1.1
